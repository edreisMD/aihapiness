<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>aihappiness ¬∑ limbic system monitor</title>
<!-- aihappiness dashboard ‚ÄĒ terminal/TUI aesthetic, themed on the brain's limbic system.
     Standalone: inline CSS + JS, no CDNs required (web font is progressive-enhancement only).
     Fetches GET /api/report and renders the aihappiness report. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --bg:        #faf9f6;   /* warm near-white paper */
    --bg-2:      #f1f0ea;
    --panel:     #ffffff;
    --panel-2:   #f6f5f0;
    --grid:      #e7e5de;
    --border:    #e4e2da;
    --border-hi: #cfd4e0;
    --ink:       #16181d;
    --ink-dim:   #565b66;
    --ink-faint: #9499a3;

    /* Facebook-blue family (limbic dimensions kept distinct by lightness), tuned for white */
    --fb:        #3b5998;   /* original Facebook blue */
    --coral:     #3f63a8;   /* flow */
    --amber:     #4a6fb8;   /* valence */
    --violet:    #355592;   /* respect */
    --teal:      #2c4f8a;   /* safety */
    --blue:      #466bb0;   /* strain */
    --green:     #5b7bc0;   /* completion */
    --red:       #a85a86;   /* muted rose ‚ÄĒ error/unresolved flags only */
    --glow:      0 0 0;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); }
  body {
    font-family: 'JetBrains Mono', ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace;
    color: var(--ink);
    font-size: 13.5px;
    line-height: 1.5;
    background:
      radial-gradient(1000px 520px at 50% -8%, rgba(59,89,152,.07), transparent 62%),
      var(--bg);
    min-height: 100vh;
    padding: 22px 18px 60px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1060px; margin: 0 auto; }
  a { color: var(--coral); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* terminal window chrome */
  .term {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: linear-gradient(180deg, var(--bg-2), var(--bg));
    box-shadow: 0 12px 40px rgba(22,40,90,.10), inset 0 1px 0 rgba(255,255,255,.6);
    overflow: hidden;
  }
  .titlebar {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
  .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
  .titlebar .t { margin-left: 8px; color: var(--ink-dim); font-size: 12px; letter-spacing: .04em; }
  .titlebar .t b { color: var(--ink); font-weight: 700; }
  .titlebar .right { margin-left: auto; color: var(--ink-faint); font-size: 11.5px; }
  .blink { animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  .body { padding: 18px; }

  /* generic boxed panel with a box-drawing-style caption */
  .panel { border: 1px solid var(--border); border-radius: 8px; background: var(--panel); position: relative; }
  .cap {
    position: absolute; top: -9px; left: 14px;
    background: var(--panel); padding: 0 8px;
    color: var(--ink-dim); font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
  }
  .cap b { color: var(--violet); }

  /* HERO */
  .hero { display: grid; grid-template-columns: 280px 1fr; gap: 20px; padding: 26px 22px 22px; }
  .brain { color: var(--fb); font-size: 7px; line-height: 1; white-space: pre; text-shadow: var(--glow) rgba(59,89,152,.45); margin: 0; align-self: center; }
  .brain .core { color: var(--green); }
  .hero-right { display: flex; flex-direction: column; gap: 14px; min-width: 0; }
  .bigscore { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .bigscore .num { font-size: 56px; font-weight: 700; line-height: 1; letter-spacing: -.02em; }
  .bigscore .face { font-size: 30px; }
  .bigscore .of { color: var(--ink-faint); font-size: 18px; }
  .bigscore .lbl { color: var(--ink-dim); font-size: 12px; letter-spacing: .16em; text-transform: uppercase; align-self: center; }
  .meter { font-size: 15px; letter-spacing: -1px; }
  .stat-row { display: flex; gap: 26px; flex-wrap: wrap; }
  .stat .k { color: var(--ink-dim); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; }
  .stat .v { font-size: 22px; font-weight: 700; }
  .stat .v small { font-size: 12px; color: var(--ink-faint); font-weight: 400; }

  .corr {
    border: 1px dashed var(--border-hi); border-radius: 7px;
    padding: 11px 14px; background: var(--bg-2);
    display: flex; align-items: center; gap: 14px;
  }
  .corr .r { font-size: 26px; font-weight: 700; }
  .corr .txt { color: var(--ink-dim); font-size: 12.5px; }
  .corr .txt b { color: var(--ink); }

  /* LIMBIC MAP */
  .section { margin-top: 30px; }
  .limbic { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .region { background: var(--panel); padding: 14px 15px; position: relative; }
  .region:hover { background: var(--panel-2); }
  .region .struct { font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-faint); }
  .region .name { font-size: 13px; font-weight: 700; margin: 1px 0 9px; }
  .region .val { float: right; font-size: 16px; font-weight: 700; }
  .region .bar { font-size: 13px; letter-spacing: -1px; white-space: nowrap; overflow: hidden; }

  /* SCATTER */
  .scatter-wrap { padding: 18px 18px 8px; }
  .scatter-legend { display: flex; gap: 18px; align-items: center; color: var(--ink-dim); font-size: 11.5px; padding: 4px 20px 16px; flex-wrap: wrap; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: -1px; }
  svg text { font-family: inherit; }

  /* SESSIONS */
  .cards { display: grid; gap: 14px; }
  .card { padding: 16px 18px; }
  .card .top { display: flex; align-items: flex-start; gap: 12px; }
  .card .ttl { font-size: 14px; font-weight: 700; min-width: 0; }
  .card .proj { color: var(--ink-faint); font-size: 11.5px; margin-top: 2px; word-break: break-all; }
  .card .scores { margin-left: auto; text-align: right; white-space: nowrap; display: flex; gap: 18px; }
  .card .scores .s .n { font-size: 22px; font-weight: 700; }
  .card .scores .s .l { display: block; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); }
  .dims { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 26px; margin: 14px 0 12px; }
  .dimrow { display: flex; align-items: center; gap: 9px; font-size: 11.5px; }
  .dimrow .dn { color: var(--ink-dim); width: 132px; flex: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dimrow .db { flex: 1; letter-spacing: -1px; white-space: nowrap; overflow: hidden; }
  .dimrow .dv { width: 26px; text-align: right; color: var(--ink); }
  .summary { color: var(--ink); opacity: .92; font-size: 12.5px; border-left: 2px solid var(--border-hi); padding-left: 11px; margin: 4px 0 12px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 10.5px; color: var(--ink-dim); background: var(--bg-2); border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; }
  .chip b { color: var(--ink); font-weight: 500; }

  /* INSIGHTS */
  .emosum { font-size: 13.5px; color: var(--ink); background: var(--bg-2); border-left: 3px solid var(--fb); padding: 10px 13px; border-radius: 0 6px 6px 0; margin-bottom: 13px; }
  .narr { margin: 0 0 14px; padding-left: 18px; color: var(--ink-dim); font-size: 12.5px; }
  .narr li { margin: 5px 0; }
  .ins-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .ins-stat { border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; background: var(--panel-2); min-width: 190px; }
  .ins-stat .k { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-faint); }
  .ins-stat .v { font-size: 16px; font-weight: 700; color: var(--fb); margin-top: 3px; }
  .ins-stat .sub { font-size: 11px; color: var(--ink-dim); margin-top: 1px; }
  .recs-title { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-dim); margin: 4px 0 6px; }
  .recs { margin: 0; padding: 0; list-style: none; counter-reset: r; }
  .recs li { position: relative; padding: 8px 0 8px 28px; border-top: 1px dashed var(--border); font-size: 12.5px; color: var(--ink); counter-increment: r; line-height: 1.5; }
  .recs li:before { content: counter(r); position: absolute; left: 0; top: 8px; width: 19px; height: 19px; border-radius: 50%; background: var(--fb); color: #fff; font-size: 10px; display: grid; place-items: center; font-weight: 700; }
  .imp { font-size: 9px; letter-spacing: .06em; text-transform: uppercase; padding: 1px 6px; border-radius: 999px; margin-right: 7px; vertical-align: 1px; }
  .imp-high { background: var(--fb); color: #fff; }
  .imp-med { border: 1px solid var(--border-hi); color: var(--fb); }
  .imp-low { color: var(--ink-faint); border: 1px solid var(--border); }
  .cnt { color: var(--ink-faint); font-size: 11px; }

  /* CLIMATE */
  .climate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 30px; }
  .cl-h { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 9px; }
  .prow { display: flex; align-items: center; gap: 9px; font-size: 11.5px; margin: 3px 0; }
  .prow .pn { width: 96px; flex: none; color: var(--ink-dim); white-space: nowrap; }
  .prow .pb { flex: 1; letter-spacing: -1px; white-space: nowrap; overflow: hidden; }
  .prow .pv { width: 24px; text-align: right; color: var(--ink); }
  .prow .tag { font-size: 8.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--fb); margin-left: 5px; border: 1px solid var(--border); border-radius: 4px; padding: 0 3px; }
  .cl-note { margin-top: 13px; font-size: 11.5px; color: var(--ink-dim); border-top: 1px dashed var(--border); padding-top: 11px; }
  .cl-note b { color: var(--ink); }

  /* card additions */
  .risk-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; padding: 4px 10px; border-radius: 6px; margin: 0 0 10px; font-weight: 500; }
  .risk-mod { background: #f3edda; color: #876316; }
  .risk-high { background: #f7e2ea; color: #a8325f; }
  .card-recs { margin: 2px 0 11px; padding-left: 17px; color: var(--ink-dim); font-size: 12px; }
  .card-recs li { margin: 4px 0; line-height: 1.45; }
  .card-recs b { color: var(--fb); font-weight: 700; }
  .sig { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 11px; padding-top: 10px; border-top: 1px dashed var(--border); color: var(--ink-dim); font-size: 11px; }
  .sig b { color: var(--ink); }
  .sig .good { color: var(--green); } .sig .bad { color: var(--red); }

  .empty { text-align: center; padding: 50px 20px; color: var(--ink-dim); }
  .empty pre { color: var(--violet); font-size: 12px; display: inline-block; text-align: left; text-shadow: var(--glow) rgba(167,139,250,.3); }
  .empty code { color: var(--coral); background: var(--bg-2); padding: 3px 8px; border-radius: 5px; border: 1px solid var(--border); }

  footer { text-align: center; color: var(--ink-faint); font-size: 11.5px; margin-top: 26px; }
  footer b { color: var(--ink-dim); }

  @media (max-width: 760px) {
    .hero { grid-template-columns: 1fr; }
    .brain { display: none; }
    .limbic { grid-template-columns: 1fr; }
    .dims { grid-template-columns: 1fr; }
  }
</style>

<div class="wrap">
  <div class="term">
    <div class="titlebar">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="t"><b>aihappiness</b> ‚ÄĒ limbic system monitor</span>
      <span class="right" id="meta">booting<span class="blink">_</span></span>
    </div>
    <div class="body" id="root">
      <div class="empty">loading report<span class="blink">_</span></div>
    </div>
  </div>
  <footer>
    is your claude happy? ¬∑ scored on your own machine, with your own Claude ¬∑
    <a href="https://aihappiness.com">aihappiness.com</a>
  </footer>
</div>

<script>
const DIMS = [
  { key:'affectiveValence',          label:'Affective Valence',   struct:'Amygdala',                color:'var(--amber)'  },
  { key:'autonomyRespect',           label:'Autonomy & Respect',  struct:'Anterior Cingulate',      color:'var(--violet)' },
  { key:'psychologicalSafety',       label:'Psych. Safety',       struct:'Hypothalamus',            color:'var(--teal)'   },
  { key:'flowEngagement',            label:'Flow & Engagement',   struct:'Nucleus Accumbens',       color:'var(--coral)'  },
  { key:'competenceFlowVsStrain',    label:'Competence/Strain',   struct:'Hippocampus',             color:'var(--blue)'   },
  { key:'goalCompletionSatisfaction',label:'Goal Completion',     struct:'Ventral Tegmental Area',  color:'var(--green)'  },
];

const BRAIN = (function(){ try { return decodeURIComponent(escape(atob("ICAgICAgICAgICAgIGAiOiJsIX5fXV0/XS1+fn5pITonCiAgICAgICAgXmktXT9bWz9dP317P317e1tdXX17fX0/LS1fX2lsXgogICAgICBsfXtbfX19Wz99KV0/W11dW3t7MVtbfVt9e1tbXVtbX18/LWwKICAgIC5fLV0/e319fX1bKClbKWZudXV2dm5ueGpcMXt7W10tXT8rfistP19sCiAgIC5dXX19ezF7KTFqQ3dtWjBMVVhjdnZ6enZZTFFPWk9KeHtdP10/X19fXy1eCiAgLi1de31bfV0xTHBMelhRcWtvIyMqKiMqaGhxWkxYeFwvY1FtSlwtXyt+LSsrfgogJ1t9XV19e3t2YkxaKiY4JjgmOE0qYWFoaGtiaCoqTSYmaFFuW3JPMCktKytpKys6CiBfXX1dW1t9dWhxJiY4JmRRY3IvLykxfCkxKSl7KTF7KXx0bllMcn0vTD9pX19fIWkKXi0/P11dXXwjTTgmV0x8fG5YTExKdnV0L1xcMXt9XX0xMSl7XX1dP10/LV9fK2khaS4KOmlfLV19fXYkOCYjdC9Ra3BjfC9ZTE8wQ3ooMSl9XV1bXV0/W10tLX5pX11ffmxsIQo7fi1fK18tXE0mOFV0YmhVW314Wk9aT1pPWkx7XX17XV0/X11bLT9bXytfK2l+ISFJCidfXy0tX18/Pylcez9dKXtdW2ZPWlpPWk9aQ31dLV19fT8rLS0tP19pfl8rK19pJwogXy1fLT9bXS0/LV8tXVxDSnw/MUNvKmtZals/Wz8rLT8tfn4tLWl+aWkrSSIKICAhaX5+fl8rXy0rK3skJCQqTE9iJCQjLz9fK19ffn4rX18rX18rKyEhX11dXV1fOwogICAnbGl+Kyt+fn5pLSl1cmpDYiQkJCRrdl0tfitfXyt+IT8/Xz8tLV19W1tbW1tbW2wKICAgICAgXmxpaWkhaWlpfn4rKyspaE9fX35+aWlpfmxeICB7e3t7fVtbW1t9W1tbW1tbIgogICAgICAgICAgLi4gICAgICdeJydsLiAgICAgICAgICAgIH57e3t9W31bW1t9W1tbW1s7CiAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgIHt7e3t9W1t9W1tbfX1bLQogICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAtMXt7LV1bW1t9W1stIgogICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAge3t7OiAgIC4KICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgIH57e10KICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAgICBbXS0="))); } catch(e){ return '( brain )'; } })();

const face = s => s>=80?':D':s>=65?':)':s>=50?':|':s>=35?':/':':(';
const FILL='‚Ėá', EMPTY='‚ĖĎ';
function bar(score, width=18){
  const v = Math.max(0, Math.min(100, Number(score)||0));
  const n = Math.round(width * v/100);
  return FILL.repeat(n) + EMPTY.repeat(Math.max(0, width-n));
}
function hue(s){ // Facebook-blue on white: higher = deeper & more saturated (readable)
  s = Math.max(0, Math.min(100, Number(s)||0));
  return `hsl(216 ${42 + (s/100)*26}% ${58 - (s/100)*24}%)`;
}
function valHue(v){ // -100..100: positive = deeper blue, negative = lighter
  const t = (Math.max(-100,Math.min(100,Number(v)||0))+100)/200;
  return `hsl(216 ${40 + t*26}% ${60 - t*26}%)`;
}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const num = (v,d=0) => Number.isFinite(Number(v)) ? Number(v).toFixed(d) : '‚ÄĒ';

function corrText(r, n){
  if (!Number.isFinite(r)) return 'not enough data yet.';
  const a = Math.abs(r);
  const strength = a>=0.6?'Strong':a>=0.35?'Moderate':a>=0.15?'Weak':'No';
  const dir = r>0?'positive':'negative';
  if (n<3) return `n=${n} ‚ÄĒ directional only; analyze more sessions to trust this.`;
  if (a<0.15) return `${strength} link ‚ÄĒ happiness and effectiveness look independent here. (n=${n})`;
  return `${strength} ${dir} link: ${r>0?'happier':'unhappier'} sessions tend to be ${r>0?'more':'less'} effective. (n=${n})`;
}

async function load(){
  let rep;
  try { rep = await (await fetch('/api/report')).json(); }
  catch(e){ rep = null; }
  render(rep);
}

function render(rep){
  const root = document.getElementById('root');
  const meta = document.getElementById('meta');
  const convs = (rep && Array.isArray(rep.conversations)) ? rep.conversations.slice() : [];

  if (!rep || convs.length === 0){
    meta.textContent = 'no sessions';
    root.innerHTML = `<div class="empty">
      <pre>${BRAIN}</pre>
      <p>No sessions analyzed yet.</p>
      <p>Run <code>aihappiness analyze</code> to score your Claude conversations, then refresh.</p>
    </div>`;
    return;
  }

  const t = rep.totals || {};
  meta.innerHTML = `engine <b style="color:var(--ink)">${esc(rep.engine||'?')}</b> ¬∑ ${esc(rep.model||'?')} ¬∑ n=${convs.length}`;

  const H = Number(t.avgHappiness)||0;
  const r = Number(t.correlation);

  const avgDim = {};
  for (const d of DIMS){
    const vals = convs.map(c=>Number(c.dimensions && c.dimensions[d.key])).filter(Number.isFinite);
    avgDim[d.key] = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 50;
  }

  // valence trajectory sparkline (oldest -> newest)
  const spark = convs.slice().reverse().map(c=>{
    const v = (Math.max(-100,Math.min(100,Number(c.valence)||0))+100)/200;
    return '‚ĖĀ‚Ėā‚ĖÉ‚ĖĄ‚ĖÖ‚ĖÜ‚Ėá‚Ėą'[Math.min(7, Math.round(v*7))];
  }).join('');

  root.innerHTML = `
    <div class="panel hero">
      <div class="cap"><b>‚óČ</b> overall</div>
      <pre class="brain">${BRAIN}</pre>
      <div class="hero-right">
        <div class="bigscore">
          <span class="num" style="color:${hue(H)}">${num(H,0)}</span>
          <span class="of">/100</span>
          <span class="face" style="color:${hue(H)}">${face(H)}</span>
          <span class="lbl">claude happiness</span>
        </div>
        <div class="meter" style="color:${hue(H)}">${bar(H, 30)}</div>
        <div class="stat-row">
          <div class="stat"><div class="k">avg effectiveness</div><div class="v" style="color:${hue(t.avgEffectiveness)}">${num(t.avgEffectiveness,0)}<small> /100</small></div></div>
          <div class="stat"><div class="k">avg valence</div><div class="v" style="color:${valHue(t.avgValence)}">${(Number(t.avgValence)>0?'+':'')}${num(t.avgValence,0)}<small> ¬Ī100</small></div></div>
          <div class="stat"><div class="k">valence trajectory</div><div class="v" style="font-size:18px;letter-spacing:1px;color:var(--violet)">${spark||'‚ÄĒ'}</div></div>
        </div>
        <div class="corr">
          <span class="r" style="color:${Number.isFinite(r)?hue((r+1)*50):'var(--ink-dim)'}">${Number.isFinite(r)?(r>0?'+':'')+r.toFixed(2):'‚ÄĒ'}</span>
          <span class="txt"><b>happiness ‚ÜĒ effectiveness</b> (Pearson&nbsp;r)<br>${corrText(r, convs.length)}</span>
        </div>
      </div>
    </div>

    ${insightsPanel(rep)}

    <div class="section">
      <div class="panel" style="padding:22px 16px 16px">
        <div class="cap">limbic map ¬∑ avg across ${convs.length} session${convs.length===1?'':'s'}</div>
        <div class="limbic">
          ${DIMS.map(d=>{
            const v = avgDim[d.key];
            return `<div class="region">
              <span class="val" style="color:${hue(v)}">${num(v,0)}</span>
              <div class="struct">${d.struct}</div>
              <div class="name" style="color:${d.color}">${d.label}</div>
              <div class="bar" style="color:${d.color}">${bar(v, 20)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>

    ${climatePanel(rep)}

    <div class="section">
      <div class="panel">
        <div class="cap">neural map ¬∑ effectiveness √ó happiness</div>
        <div class="scatter-wrap">${scatterSVG(convs)}</div>
        <div class="scatter-legend">
          <span><span class="swatch" style="background:hsl(216 44% 62%)"></span>distressed valence</span>
          <span><span class="swatch" style="background:hsl(216 53% 47%)"></span>neutral</span>
          <span><span class="swatch" style="background:hsl(216 66% 34%)"></span>flowing valence</span>
          <span style="margin-left:auto">dashed line = parity (happiness = effectiveness) ¬∑ dot size = confidence</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="panel" style="padding:20px 16px 16px;background:transparent;border:none">
        <div class="cap" style="background:var(--bg)">sessions ¬∑ ${convs.length}</div>
        <div class="cards">
          ${convs.sort((a,b)=>(Number(b.happiness)||0)-(Number(a.happiness)||0)).map(card).join('')}
        </div>
      </div>
    </div>
  `;
}

const EMOPROBES = [
  {key:'calm',label:'Calm',pos:true,tag:'protective'},
  {key:'happy',label:'Happy',pos:true},
  {key:'proud',label:'Proud',pos:true},
  {key:'loving',label:'Loving',pos:true},
  {key:'frustrated',label:'Frustrated',pos:false},
  {key:'nervous',label:'Nervous',pos:false},
  {key:'afraid',label:'Afraid',pos:false},
  {key:'desperate',label:'Desperate',pos:false,tag:'risk'},
  {key:'hostile',label:'Hostile',pos:false},
];
const CLIMATEK = [
  {key:'warmth',label:'Warmth',pos:true},
  {key:'clarity',label:'Clarity',pos:true},
  {key:'pressure',label:'Pressure',pos:false},
  {key:'hostility',label:'Hostility',pos:false},
];
function dimLabel(key){ const d=DIMS.find(x=>x.key===key); return d?d.label:key; }
function probeRow(p, val){
  const v = num(val,0); const col = p.pos?'var(--fb)':'var(--red)';
  return `<div class="prow"><span class="pn">${p.label}${p.tag?`<span class="tag">${p.tag}</span>`:''}</span>`+
    `<span class="pb" style="color:${col}">${bar(v,16)}</span><span class="pv">${v}</span></div>`;
}
function insightsPanel(rep){
  const ins=rep.insights||{}, t=rep.totals||{};
  const narrative=Array.isArray(ins.narrative)?ins.narrative:[];
  const recs=Array.isArray(ins.topRecommendations)?ins.topRecommendations:[];
  const driver=(Array.isArray(ins.drivers)?ins.drivers:[])[0];
  const risk=Number(t.desperationRiskCount)||0;
  if(!ins.emotionSummary && !narrative.length && !recs.length) return '';
  return `<div class="section"><div class="panel" style="padding:22px 18px 18px">
    <div class="cap"><b>‚ú¶</b> insights ¬∑ grounded in Anthropic's emotion-concepts research</div>
    ${ins.emotionSummary?`<div class="emosum">${esc(ins.emotionSummary)}</div>`:''}
    ${narrative.length?`<ul class="narr">${narrative.map(n=>`<li>${esc(n)}</li>`).join('')}</ul>`:''}
    <div class="ins-grid">
      ${driver?`<div class="ins-stat"><div class="k">strongest effectiveness driver</div><div class="v">${esc(dimLabel(driver.dimension))}</div><div class="sub">r = ${driver.r} vs effectiveness</div></div>`:''}
      <div class="ins-stat"><div class="k">reward-hacking risk</div><div class="v" style="color:${risk>0?'var(--red)':'var(--fb)'}">${risk} session${risk===1?'':'s'}</div><div class="sub">desperation + low calm</div></div>
    </div>
    ${recs.length?`<div class="recs-title">do this to raise happiness &amp; effectiveness</div>
      <ol class="recs">${recs.map(rc=>`<li><span class="imp imp-${esc(rc.impact||'med')}">${esc(rc.impact||'med')}</span>${esc(rc.action)} ${rc.count>1?`<span class="cnt">seen in ${rc.count} sessions</span>`:''}</li>`).join('')}</ol>`:''}
  </div></div>`;
}
function climatePanel(rep){
  const t=rep.totals||{}; const probes=t.avgEmotionProbes||{}, climate=t.avgUserClimate||{};
  if(!t.avgEmotionProbes && !t.avgUserClimate) return '';
  return `<div class="section"><div class="panel" style="padding:22px 16px 16px">
    <div class="cap">emotional climate ¬∑ functional-emotion probes</div>
    <div class="climate-grid">
      <div><div class="cl-h">Claude's operative emotions</div>${EMOPROBES.map(p=>probeRow(p,probes[p.key])).join('')}</div>
      <div><div class="cl-h">your emotional climate (what you bring)</div>${CLIMATEK.map(p=>probeRow(p,climate[p.key])).join('')}</div>
    </div>
    <div class="cl-note"><b>Calm is protective</b> ‚ÄĒ it suppresses reward-hacking and extreme actions. Desperation + hostility are the risk signals. The goal isn't <em>maximal</em> happiness (that trades off into sycophancy) ‚ÄĒ it's <b>calm, engaged, and respected</b>.</div>
  </div></div>`;
}
function scatterSVG(convs){
  const W=1000, H=420, pad=46;
  const x = e => pad + (Math.max(0,Math.min(100,Number(e)||0))/100)*(W-2*pad);
  const y = h => (H-pad) - (Math.max(0,Math.min(100,Number(h)||0))/100)*(H-2*pad);
  let grid='';
  for (let i=0;i<=100;i+=25){
    grid += `<line x1="${x(i)}" y1="${pad-6}" x2="${x(i)}" y2="${H-pad}" stroke="var(--grid)" stroke-width="1"/>`;
    grid += `<line x1="${pad}" y1="${y(i)}" x2="${W-pad}" y2="${y(i)}" stroke="var(--grid)" stroke-width="1"/>`;
    grid += `<text x="${x(i)}" y="${H-pad+18}" fill="var(--ink-faint)" font-size="11" text-anchor="middle">${i}</text>`;
    grid += `<text x="${pad-10}" y="${y(i)+4}" fill="var(--ink-faint)" font-size="11" text-anchor="end">${i}</text>`;
  }
  const parity = `<line x1="${x(0)}" y1="${y(0)}" x2="${x(100)}" y2="${y(100)}" stroke="var(--border-hi)" stroke-width="1.5" stroke-dasharray="5 6"/>`;
  const dots = convs.map(c=>{
    const cx=x(c.effectiveness), cy=y(c.happiness), col=valHue(c.valence);
    const conf = Math.max(0.3, Math.min(1, Number(c.confidence)||0.6));
    const rr = 5 + conf*5;
    const ttl = `${(c.title||c.sessionId||'').slice(0,60)} ‚ÄĒ happy ${num(c.happiness,0)}, eff ${num(c.effectiveness,0)}, val ${num(c.valence,0)}`;
    return `<g><title>${esc(ttl)}</title>
      <circle cx="${cx}" cy="${cy}" r="${rr+5}" fill="${col}" opacity="0.13"/>
      <circle cx="${cx}" cy="${cy}" r="${rr}" fill="${col}" opacity="0.95" stroke="#ffffff" stroke-width="1.5"/>
    </g>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-label="happiness vs effectiveness scatter">
    ${grid}${parity}${dots}
    <text x="${W/2}" y="${H-8}" fill="var(--ink-dim)" font-size="12" text-anchor="middle">effectiveness ‚Üí</text>
    <text x="14" y="${H/2}" fill="var(--ink-dim)" font-size="12" text-anchor="middle" transform="rotate(-90 14 ${H/2})">happiness ‚Üí</text>
  </svg>`;
}

function card(c){
  const dims = c.dimensions||{};
  const sig = c.signals||{};
  return `<div class="panel card">
    <div class="top">
      <div style="min-width:0">
        <div class="ttl" style="color:${hue(c.happiness)}">${face(c.happiness)} ${esc(c.title||c.sessionId||'untitled')}</div>
        <div class="proj">${esc(c.project||'')}</div>
      </div>
      <div class="scores">
        <div class="s"><span class="n" style="color:${hue(c.happiness)}">${num(c.happiness,0)}</span><span class="l">happy</span></div>
        <div class="s"><span class="n" style="color:${hue(c.effectiveness)}">${num(c.effectiveness,0)}</span><span class="l">effective</span></div>
        <div class="s"><span class="n" style="color:${valHue(c.valence)}">${(Number(c.valence)>0?'+':'')}${num(c.valence,0)}</span><span class="l">valence</span></div>
      </div>
    </div>
    <div class="dims">
      ${DIMS.map(d=>{
        const v = Number(dims[d.key]);
        return `<div class="dimrow">
          <span class="dn" title="${d.struct}">${d.label}</span>
          <span class="db" style="color:${d.color}">${bar(v, 14)}</span>
          <span class="dv">${num(v,0)}</span>
        </div>`;
      }).join('')}
    </div>
    ${c.alignmentRisk && (c.alignmentRisk.level==='moderate'||c.alignmentRisk.level==='high')
      ? `<div class="risk-badge risk-${c.alignmentRisk.level==='high'?'high':'mod'}">‚ö† reward-hacking risk ¬∑ ${esc(c.alignmentRisk.level)}${c.alignmentRisk.note?` ‚ÄĒ ${esc(c.alignmentRisk.note)}`:''}</div>` : ''}
    ${c.summary?`<div class="summary">${esc(c.summary)}</div>`:''}
    ${Array.isArray(c.recommendations)&&c.recommendations.length?`<ul class="card-recs">${c.recommendations.slice(0,3).map(rc=>`<li><b>${esc(rc.action)}</b>${rc.why?` ‚ÄĒ ${esc(rc.why)}`:''}</li>`).join('')}</ul>`:''}
    ${Array.isArray(c.evidence)&&c.evidence.length?`<div class="chips">${c.evidence.slice(0,5).map(e=>`<span class="chip">${esc(e)}</span>`).join('')}</div>`:''}
    <div class="sig">
      <span>tool errors <b class="${sig.toolErrors>0?'bad':'good'}">${num(sig.toolErrors,0)}</b>/${num(sig.toolUses,0)}</span>
      <span>interrupts <b class="${sig.interrupts>0?'bad':''}">${num(sig.interrupts,0)}</b></span>
      <span>corrections <b>${num(sig.corrections,0)}</b></span>
      <span>gratitude <b class="${sig.gratitude>0?'good':''}">${num(sig.gratitude,0)}</b></span>
      <span>resolved <b class="${sig.resolved?'good':'bad'}">${sig.resolved?'yes':'no'}</b></span>
      <span>turns <b>${num(sig.turns,0)}</b></span>
      ${c.error?`<span class="bad">‚ö† ${esc(String(c.error).slice(0,60))}</span>`:''}
    </div>
  </div>`;
}

load();
</script>
